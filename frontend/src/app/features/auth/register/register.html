<div class="flex items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900">
  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-theme-md dark:bg-gray-dark dark:border dark:border-gray-800">
    <div class="mb-8 text-center">
      <h1 class="mb-2 text-2xl font-bold text-gray-800 dark:text-white/90">Sign Up for NexusOps</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">Create an account to start optimizing your cloud costs.</p>
    </div>

    <form class="space-y-6" (ngSubmit)="register()">
      <!-- Name -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Name <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="name" 
          name="name"
          type="text" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="Jane Doe" 
          required 
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Email <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="email" 
          name="email"
          type="email" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="admin@cloudpulse.com" 
          required 
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Password <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="password" 
          name="password"
          type="password" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="Enter your password" 
          required 
        />
      </div>

      <!-- Organization Name -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Organization Name <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="organizationName" 
          name="organizationName"
          type="text" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="e.g. Acme Corp" 
          required 
        />
      </div>

      <!-- Role Selection -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Assign Role <span class="text-error-500">*</span></label>
        <select 
          [(ngModel)]="role" 
          name="role"
          class="w-full rounded-lg border border-gray-300 bg-slate-950 px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          required
        >
          <option value="VIEWER" class="dark:bg-slate-900 text-gray-800 dark:text-white">Viewer</option>
          <option value="FINANCE" class="dark:bg-slate-900 text-gray-800 dark:text-white">Finance</option>
          <option value="ADMIN" class="dark:bg-slate-900 text-gray-800 dark:text-white">Admin</option>
        </select>
      </div>

      <button 
        type="submit" 
        class="flex w-full items-center justify-center rounded-lg bg-brand-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-brand-600 focus:outline-none"
      >
        Sign Up
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Already have an account? 
        <a routerLink="/login" class="font-medium text-brand-500 hover:text-brand-600">Sign In</a>
      </p>
    </div>
  </div>
</div>
