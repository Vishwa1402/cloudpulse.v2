<div class="flex items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900">
  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-theme-md dark:bg-gray-dark dark:border dark:border-gray-800">
    <div class="mb-8 text-center">
      <h1 class="mb-2 text-2xl font-bold text-gray-800 dark:text-white/90">Sign In to CloudPulse</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">Enter your credentials to access your dashboard.</p>
    </div>

    <form class="space-y-6" (ngSubmit)="login()">
      <!-- Email -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Email <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="email" 
          name="email"
          type="email" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="admin@cloudpulse.com" 
          required 
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Password <span class="text-error-500">*</span></label>
        <input 
          [(ngModel)]="password" 
          name="password"
          type="password" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:text-white/90" 
          placeholder="Enter your password" 
          required 
        />
      </div>

      <p class="text-sm text-error-500">{{ message }}</p>

      <button 
        type="submit" 
        class="flex w-full items-center justify-center rounded-lg bg-brand-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-brand-600 focus:outline-none"
      >
        Sign In
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Don't have an account? 
        <a routerLink="/register" class="font-medium text-brand-500 hover:text-brand-600">Register</a>
      </p>
    </div>
  </div>
</div>
