
services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusops-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cloudpulse_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Gayatri@0304
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudpulse_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexusops-backend:
    build: ./backend
    container_name: nexusops-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cloudpulse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Gayatri@0304
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nexusops-demo-service:
    build: ./demo-service
    container_name: nexusops-demo-service
    ports:
      - "8081:8081"
    restart: unless-stopped

  nexusops-frontend:
    build: ./frontend
    container_name: nexusops-frontend
    ports:
      - "4200:80"
    depends_on:
      - nexusops-backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: nexusops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nexusops-backend
      - nexusops-demo-service
    restart: unless-stopped

volumes:
  postgres_data:
