version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
